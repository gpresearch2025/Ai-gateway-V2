apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway
      component: worker
  template:
    metadata:
      labels:
        app: ai-gateway
        component: worker
    spec:
      containers:
        - name: worker
          image: ai-gateway-worker:latest
          envFrom:
            - configMapRef:
                name: ai-gateway-config
            - secretRef:
                name: ai-gateway-secrets
          volumeMounts:
            - name: gateway-data
              mountPath: /app/data
      volumes:
        - name: gateway-data
          persistentVolumeClaim:
            claimName: ai-gateway-data
